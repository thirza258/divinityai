# DivinityAI — Nginx configuration
#
# Proxies frontend (Vite dev / production build) and backend (Django).
# All configurable via environment variables.

server {
    listen 80;
    server_name localhost;

    # ------------------------------------------------------------------
    # Frontend (Vite dev server or production build)
    # ------------------------------------------------------------------
    location / {
        # In production, point to the Vite build output:
        # root /app/frontend/dist;
        # try_files $uri $uri/ /index.html;

        # In development, proxy to Vite dev server:
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Backend API (Django)
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long-running RAG pipeline queries
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Static files (Django admin, etc.)
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }
}
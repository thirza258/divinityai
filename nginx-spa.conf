# DivinityAI — Frontend SPA nginx config (production)
#
# Serves the Vite build output with client-side routing support.
# All /api/* requests are proxied to the upstream nginx reverse proxy.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any non-file route (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted static assets (Vite outputs as assets/*.js, assets/*.css)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
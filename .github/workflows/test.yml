name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # =========================================================================
  # Backend tests — Django unit + integration tests in Docker
  # =========================================================================
  backend-tests:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: divinityai-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run backend unit tests
        run: |
          docker run --rm \
            -e DEBUG=True \
            -e SECRET_KEY=test-key-for-ci \
            -e RAG_PHASE=1 \
            -e OPENROUTER_API_KEY=sk-test-placeholder \
            -e CHROMA_CLIENT_SERVER_MODE=False \
            divinityai-backend:test \
            python manage.py test \
              --verbosity=2 \
              --parallel \
              --exclude-tag=slow \
              chroma \
              corpus \
              generation \
              qa.tests \
              qa.integration_tests \
              retrieval \
              router

      - name: Run backend tests (summary)
        if: always()
        run: |
          docker run --rm \
            -e DEBUG=True \
            -e SECRET_KEY=test-key-for-ci \
            -e RAG_PHASE=1 \
            -e OPENROUTER_API_KEY=sk-test-placeholder \
            -e CHROMA_CLIENT_SERVER_MODE=False \
            divinityai-backend:test \
            python manage.py test \
              --verbosity=1 \
              chroma \
              corpus \
              generation \
              qa.tests \
              qa.integration_tests \
              retrieval \
              router

  # =========================================================================
  # Frontend tests — Vitest + React Testing Library in Docker
  # =========================================================================
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: divinityai-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run frontend tests
        run: |
          docker run --rm \
            -e CI=true \
            divinityai-frontend:test \
            sh -c "npm ci && npm run test"

  # =========================================================================
  # Full Docker Compose smoke test
  # =========================================================================
  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: cp .env.example .env

      - name: Build and start services
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8899/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
          echo "Backend did not become ready"
          docker compose logs backend
          exit 1

      - name: Test health endpoint
        run: |
          HEALTH=$(curl -s http://localhost:8899/api/v1/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || exit 1

      - name: Test query endpoint validation
        run: |
          # Test 400 on missing query
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8899/api/v1/query \
            -H "Content-Type: application/json" \
            -d '{"language": "en"}')
          if [ "$HTTP_CODE" != "400" ]; then
            echo "Expected 400, got $HTTP_CODE"
            exit 1
          fi
          echo "Query validation works correctly (400 on missing query)"

      - name: Test corpus stats endpoint
        run: |
          STATS=$(curl -s http://localhost:8899/api/v1/corpus/stats)
          echo "Corpus stats: $STATS"

      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose logs backend
          docker compose logs frontend

      - name: Cleanup
        if: always()
        run: docker compose down -v
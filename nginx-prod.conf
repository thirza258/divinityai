# DivinityAI — Production nginx reverse proxy
#
# Routes:
#   /        → frontend container (SPA with client-side routing)
#   /api/    → backend container (Django via gunicorn)
#   /static/ → backend container (Django static files)
#   /admin/  → backend container (Django admin)

server {
    listen 80;
    server_name localhost;

    # ------------------------------------------------------------------
    # Frontend — SPA served by frontend container's nginx
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Backend API (Django via gunicorn)
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Static files & Django admin
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }
}
# DivinityAI — Production overrides
# =============================================================================
# Used with: DEVELOPMENT_MODE=false make up
# Layers on top of docker-compose.yml
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend — Production (gunicorn, no hot-reload volumes)
  # ---------------------------------------------------------------------------
  backend:
    ports:
      - "8000:8000"  # internal only, nginx proxies to it
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
    volumes:
      - bm25_data:/app/backend/corpus/bm25_indexes
    # No source-code volumes — use the image as built
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn router.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  # ---------------------------------------------------------------------------
  # Frontend — Production (built assets served by nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: divinityai-frontend
    ports:
      - "5173:80"  # internal only
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-DivinityAI}
      - VITE_APP_SUBTITLE=${VITE_APP_SUBTITLE:-Quran & Hadith QA}
    volumes: []
    depends_on:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy (enabled in production)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: divinityai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped